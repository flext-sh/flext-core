# Workflow de publicação no PyPI usando Trusted Publishers
# Para usar: crie uma tag no formato v* (ex: v0.11.0) e push para o repositório
#
# Configuração no PyPI (Trusted Publisher):
# - Project: flext-core
# - Publisher: GitHub
# - Repository: flext-sh/flext-core
# - Workflow: workflow.yaml
# - Environment name: pypi

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (ex: v0.11.0)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write # Necessário para Trusted Publishers (OIDC)

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Environment configurado no PyPI para Trusted Publisher
    environment:
      name: pypi
      url: https://pypi.org/project/flext-core/${{ github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@a783c322200f0519c7926aa6faa857c4e23e9263 # v1.4.2
        with:
          virtualenvs-create: false
          installer-parallel: true

      - name: Build package
        run: poetry build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.12.4
        # Não precisa de senha/API token - usa Trusted Publisher (OIDC)
