# Regras para reconstrução de classes
# Usado por ClassReconstructor

rules:
  - id: reorder-methods
    name: "Reorder methods"
    description: "Reorder class methods to follow strict order"
    enabled: true
    severity: warning
    order:
      - category: magic
        patterns: ['^__.+__$']
      - category: property
        decorators: [property, cached_property, computed_field]
      - category: staticmethod
        decorators: [staticmethod]
      - category: classmethod
        decorators: [classmethod]
      - category: public
        visibility: public
      - category: protected
        visibility: protected
      - category: private
        visibility: private
    auto_fix: true

  - id: enforce-facade-pattern
    name: "Enforce facade pattern"
    description: "Ensure classes follow facade pattern with runtime aliases"
    enabled: true
    severity: error
    conditions:
      - type: class_name
        pattern: '^Flext\w+$'
    requirements:
      - type: runtime_alias
        format: "{alias} = {class_name}"
      - type: docstring
        contains: "Runtime alias"
    auto_fix: true

  - id: no-mro-redeclaration
    name: "No MRO redeclaration"
    description: "Prevent redeclaration of classes received via MRO"
    enabled: true
    severity: error
    pattern: 'class\s+(\w+)\([^)]+\.'
    message: "Class inherits from parent class - this is MRO redeclaration. Use plain class instead."
    auto_fix: true
    fix_action: remove_inheritance
